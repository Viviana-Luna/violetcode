name: 构建并发布 CLI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  validate:
    name: 验证发布标签与源码
    runs-on: ubuntu-24.04
    steps:
      - name: 检出源码
        uses: actions/checkout@v4

      - name: 安装 Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.7

      - name: 按锁文件安装依赖
        run: bun install --frozen-lockfile

      - name: 验证标签与版本一致
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          package_tag="v$(bun -e "console.log((await Bun.file('package.json').json()).version)")"
          test "$RELEASE_TAG" = "$package_tag"

      - name: 运行发布门禁
        run: bun run release:check

  build:
    name: 构建 ${{ matrix.asset }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            target: bun-darwin-arm64
            asset: violet-darwin-arm64.zip
            archive: zip
            binary: violet
          - runner: macos-15-intel
            target: bun-darwin-x64
            asset: violet-darwin-x64.zip
            archive: zip
            binary: violet
          - runner: ubuntu-24.04-arm
            target: bun-linux-arm64
            asset: violet-linux-arm64.tar.gz
            archive: tar
            binary: violet
          - runner: ubuntu-24.04
            target: bun-linux-x64
            asset: violet-linux-x64.tar.gz
            archive: tar
            binary: violet
          - runner: ubuntu-24.04
            target: bun-linux-x64-baseline
            asset: violet-linux-x64-baseline.tar.gz
            archive: tar
            binary: violet
          - runner: windows-latest
            target: bun-windows-x64
            asset: violet-windows-x64.zip
            archive: zip
            binary: violet.exe
    runs-on: ${{ matrix.runner }}
    steps:
      - name: 检出源码
        uses: actions/checkout@v4

      - name: 安装 Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.7

      - name: 按锁文件安装依赖
        run: bun install --frozen-lockfile

      - name: 构建 standalone 二进制
        run: bun run build:release -- --target "${{ matrix.target }}" --outdir dist/native

      - name: 验证版本与帮助
        env:
          BINARY: ${{ matrix.binary }}
        run: |
          dist/native/"$BINARY" --version
          dist/native/"$BINARY" --help >/dev/null

      - name: 打包发布资产
        env:
          ASSET_NAME: ${{ matrix.asset }}
          ARCHIVE_TYPE: ${{ matrix.archive }}
          BINARY: ${{ matrix.binary }}
        run: |
          mkdir -p dist/package
          if [[ "$ARCHIVE_TYPE" == "zip" ]]; then
            if [[ "$RUNNER_OS" == "Windows" ]]; then
              # Windows Git Bash 不保证有 zip；用系统自带 bsdtar 造 zip（可被 Expand-Archive/tar 解开）。
              "C:/Windows/System32/tar.exe" -a -c -f "dist/package/$ASSET_NAME" -C dist/native "$BINARY"
            else
              zip -j "dist/package/$ASSET_NAME" dist/native/"$BINARY"
            fi
          else
            tar -C dist/native -czf "dist/package/$ASSET_NAME" "$BINARY"
          fi

      - name: 上传 Actions Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/package/${{ matrix.asset }}
          if-no-files-found: error
          retention-days: 7

  publish:
    name: 汇总并公开 Pre-release
    needs: build
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: 检出标签
        uses: actions/checkout@v4

      - name: 下载全部发布资产
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: 验证资产清单并生成哈希
        working-directory: release-assets
        run: |
          expected=(
            violet-darwin-arm64.zip
            violet-darwin-x64.zip
            violet-linux-arm64.tar.gz
            violet-linux-x64.tar.gz
            violet-linux-x64-baseline.tar.gz
            violet-windows-x64.zip
          )
          test "$(find . -maxdepth 1 -type f | wc -l | tr -d ' ')" = "6"
          for asset in "${expected[@]}"; do
            test -s "$asset"
          done
          sha256sum "${expected[@]}" > SHA256SUMS
          sha256sum --check SHA256SUMS

      - name: 创建 Draft Release 并上传资产
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          gh release create "$RELEASE_TAG" \
            --verify-tag \
            --draft \
            --prerelease \
            --title "VioletCode $RELEASE_TAG" \
            --generate-notes
          gh release upload "$RELEASE_TAG" release-assets/*

      - name: 公开 Pre-release
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: gh release edit "$RELEASE_TAG" --draft=false --prerelease
