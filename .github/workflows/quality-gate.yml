name: 发布质量门禁

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  offline-quality:
    name: ${{ matrix.os }} 发布质量检查
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - name: 检出源码
        uses: actions/checkout@v4

      - name: 安装 Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.7

      - name: 按锁文件安装依赖
        run: bun install --frozen-lockfile

      - name: 运行 Linux 完整发布门禁
        if: runner.os == 'Linux'
        run: bun run release:check

      - name: 运行 macOS 完整发布门禁
        if: runner.os == 'macOS'
        run: bun run release:check -- --skip-audit
