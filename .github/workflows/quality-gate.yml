name: 发布质量门禁

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  offline-quality:
    name: ${{ matrix.os }} 离线质量检查
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - name: 检出源码
        uses: actions/checkout@v4

      - name: 安装 Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.7

      - name: 按锁文件安装依赖
        run: bun install --frozen-lockfile

      - name: 运行核心测试
        run: bun run test:core

      - name: 运行类型增量门禁
        run: bun run typecheck

      - name: 检查 CLI 帮助与版本
        run: |
          ./violet --help >/dev/null
          ./violet --version

      - name: 审计生产依赖
        if: runner.os == 'Linux'
        run: bun audit --production
